<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ركن الصيدلة المعتمد</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:linear-gradient(180deg,#eaf5ff,#ffffff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:350px;
background:#fff;
padding:30px;
border-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
text-align:center;
}

.logo{
width:170px;
height:170px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:5px solid #0b5ea8;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
color:#0b5ea8;
margin:20px 0 10px;
font-size:30px;
}

p{
color:#666;
margin-bottom:25px;
}

.btn{
display:block;
text-decoration:none;
padding:18px;
margin:15px 0;
border-radius:18px;
color:white;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.04);
}

.facebook{
background:#1877F2;
}

.whatsapp{
background:#25D366;
}

.phone{
background:#0b5ea8;
}

.footer{
margin-top:30px;
color:#0b5ea8;
font-size:20px;
font-weight:bold;
}

.footer span{
display:block;
font-size:16px;
color:#666;
margin-top:8px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="">
</div>

<h1>ركن الصيدلة المعتمد</h1>

<p>نقدم لكم أفضل الخدمات الصيدلانية</p>

<a class="btn facebook" href="https://facebook.com/YourPage">
<i class="fab fa-facebook-f"></i>
تابعنا على فيسبوك
</a>

<a class="btn whatsapp" href="https://wa.me/2189XXXXXXXX">
<i class="fab fa-whatsapp"></i>
تواصل معنا على واتساب
</a>

<a class="btn phone" href="tel:+2189XXXXXXXX">
<i class="fas fa-phone"></i>
اتصل بنا مباشرة
</a>

<div class="footer">
💚 شكراً لتعاملك معنا
<span>نسعد بخدمتكم دائماً</span>
</div>

</div>

</body>
</html>
